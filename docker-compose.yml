# FlowForge — Base infrastructure: PostgreSQL + Redis.
# Always start this first. All other compose files depend on these services.
#
# Usage:
#   docker compose up -d
#
# This creates two databases via init.sql:
#   - flowforge (app DB, user: flowforge/flowforge)
#   - airflow   (Airflow metadata DB, user: airflow/airflow)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init-airflow.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    # Redis is limited to 7.2-bookworm due to licensing change
    # https://redis.io/blog/redis-adopts-dual-source-available-licensing/
    image: redis:7.2-bookworm
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
