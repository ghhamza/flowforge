# FlowForge — Backend (FastAPI).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.backend.yml up -d
#
# Requires: docker-compose.yml (postgres + redis) running first.
# For codegen DAG writing, also start Airflow so the dags/ folder is meaningful.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://flowforge:flowforge@postgres:5432/flowforge
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      AIRFLOW_API_URL: http://airflow-apiserver:8080/api/v2
      DEBUG: ${DEBUG:-true}
      DAGS_DIR: ${DAGS_DIR:-/opt/airflow/dags}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ${AIRFLOW_PROJ_DIR:-./airflow}/dags:/opt/airflow/dags
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
